<!DOCTYPE html>
<html lang="pt-br">

<head>
  <!-- META -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMPLO | Voltrucks</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/main.css">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONES -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="header-container"></div>

      <article class="produtos-page">
    <div class="produtos-container">

      <!-- BREADCRUMB -->
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="/pages/produtos.html">Início</a>
          </li>
          <li class="breadcrumb-item active">
            SIMPLO - MANUAIS TECNICOS ELETRÔNICOS
          </li>
        </ol>
      </nav>
    </article>

  <div class="container-produto">

    <!-- IMAGEM PRINCIPAL -->
    <div class="produto-imagem">

      <div class="imagem-principal" id="areaZoom">
        <img id="imagemPrincipal" src="/assets/img/products/simplo/simplo.jpg">
      </div>

      <!-- MINIATURAS -->
      <div class="miniaturas-container">

        <div class="lista-imagens" id="listaImagens">
          <img src="/assets/img/products/simplo/simplo1.jpeg">
          <img src="/assets/img/products/simplo/simplo2.jpeg">
          <img src="/assets/img/products/simplo/simplo3.jpg">
          
        </div>

      </div>

    </div>

    <!-- INFORMAÇÕES DO PRODUTO -->
    <div class="produto-info">

      <!-- NOME DO PRODUTO -->
      <h1 class="produto-nome">
        SIMPLO - MANUAIS TECNICOS ELETRÔNICOS.
      </h1>

      <!-- CÓDIGO DA PEÇA -->
      <p class="produto-codigo">
        Código da peça: <strong>SIMPLO-009</strong>
      </p>

      <!-- BOTÃO COMPRAR -->
      <button id="btnCarrinho" class="btn btn-carrinho-verde" data-nome="SIMPLO - MANUAIS TECNICOS ELETRÔNICOS"
        data-codigo="SIMPLO-009" data-preco="0">
        <i class="bi bi-cart-check"></i> ADICIONAR AO CARRINHO
      </button>

      <!-- PARCELAMENTO -->
      <div class="produto-parcelamento">
        💳 Cartão de crédito até 12x sem juros
      </div>

      <div class="cartoes">
        <img src="/assets/img/cartoes/visa.png" alt="Visa">
        <img src="/assets/img/cartoes/master.png" alt="Mastercard">
        <img src="/assets/img/cartoes/american.png" alt="American Express">
        <img src="/assets/img/cartoes/diners.png" alt="Diners Club">
        <img src="/assets/img/cartoes/discover.png" alt="Discover">
        <img src="/assets/img/cartoes/elo.png" alt="Elo">
      </div>

    </div>

  </div>

  <!-- DESCRIÇÃO DO PRODUTO -->
  <div class="produto-descricao">
    <h2>Descrição do Produto</h2>
    <p>
      SIMPLO - MANUAIS TECNICOS ELETRÔNICOS.
    </p>
  </div>



  <div id="footer-container"></div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/contador-carrinho.js"></script>
  <script src="/assets/js/add-carrinho.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/program.js"></script>
</body>

</html>
