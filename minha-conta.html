<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras | Voltrucks</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/main.css">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICONES -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="header-container"></div>

    <section class="user-page">
        <div class="user-container">

            <!-- SIDEBAR -->
            <aside class="user-sidebar">
                <div class="user-profile">
                    <img src="assets/img/user.png" alt="Usuário">
                    <h3>Rafael</h3>
                    <p>Cliente VolTrucks</p>
                </div>

                <nav class="user-menu">
                    <a href="#" class="active">Dashboard</a>
                    <a href="#">Meus Pedidos</a>
                    <a href="#">Favoritos</a>
                    <a href="#">Endereços</a>
                    <a href="#">Configurações</a>
                    <a href="#" class="logout">Sair</a>
                </nav>
            </aside>

            <!-- CONTEÚDO -->
            <main class="user-content">

                <h1>Minha Conta</h1>

                <!-- CARDS -->
                <div class="user-cards">

                    <div class="card">
                        <h2>Pedidos</h2>
                        <p>3 realizados</p>
                    </div>

                    <div class="card">
                        <h2>Favoritos</h2>
                        <p>5 produtos</p>
                    </div>

                    <div class="card">
                        <h2>Endereços</h2>
                        <p>2 cadastrados</p>
                    </div>

                </div>

                <!-- TABELA PEDIDOS -->
                <div class="orders">
                    <h2>Últimos Pedidos</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Status</th>
                                <th>Valor</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td>#001</td>
                                <td>Volvo FH Peças</td>
                                <td class="ok">Entregue</td>
                                <td>R$ 1.200</td>
                            </tr>

                            <tr>
                                <td>#002</td>
                                <td>Filtro Diesel</td>
                                <td class="pending">Em andamento</td>
                                <td>R$ 350</td>
                            </tr>
                        </tbody>
                    </table>

                </div>

            </main>

        </div>
    </section>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/contador-carrinho.js"></script>
    <script src="/assets/js/carrinho.js"></script>
    <script src="/assets/js/layout.js"></script>
    <script src="/assets/js/header.js"></script>

    </script> <!-- muda seta moude -->

</body>

</html>
